<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#161610"/>
  <!-- Grenade body -->
  <ellipse cx="200" cy="170" rx="55" ry="72" fill="#1e1e16" stroke="#4a4830" stroke-width="3"/>
  <!-- Body segments -->
  <line x1="148" y1="145" x2="252" y2="145" stroke="#4a4830" stroke-width="2"/>
  <line x1="146" y1="170" x2="254" y2="170" stroke="#4a4830" stroke-width="2"/>
  <line x1="148" y1="195" x2="252" y2="195" stroke="#4a4830" stroke-width="2"/>
  <!-- Neck -->
  <rect x="185" y="90" width="30" height="26" rx="5" fill="#1e1e16" stroke="#4a4830" stroke-width="2.5"/>
  <!-- Lever -->
  <rect x="186" y="60" width="14" height="38" rx="4" fill="#4a4830"/>
  <!-- Pin ring -->
  <circle cx="228" cy="64" r="12" fill="none" stroke="#7a7260" stroke-width="2.5"/>
  <line x1="238" y1="57" x2="254" y2="47" stroke="#7a7260" stroke-width="2.5"/>
  <!-- Subtle glow -->
  <ellipse cx="200" cy="170" rx="55" ry="72" fill="none" stroke="#e9e9e9" stroke-width="0.5" opacity="0.08"/>
</svg>
